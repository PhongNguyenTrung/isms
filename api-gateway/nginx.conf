events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        resolver 127.0.0.11 valid=10s ipv6=off;

        location /api/auth/ {
            set $target http://auth-service:3001;
            proxy_pass $target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/menu/ {
            set $target http://ordering-service:3002;
            proxy_pass $target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/orders/ {
            set $target http://ordering-service:3002;
            proxy_pass $target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/kitchen/ {
            set $target http://kitchen-service:3003;
            proxy_pass $target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/inventory/ {
            set $target http://inventory-service:3005;
            proxy_pass $target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notifications/ {
            set $target http://notification-service:3006;
            proxy_pass $target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/analytics/ {
            set $target http://analytics-service:3007;
            proxy_pass $target;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket for Analytics Dashboard (Manager Dashboard)
        location /analytics.io/ {
            set $target http://analytics-service:3007;
            rewrite ^/analytics\.io(.*)$ /socket.io$1 break;
            proxy_pass $target;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # WebSocket support for Kitchen Display System
        location /socket.io/ {
            set $target http://kitchen-service:3003;
            proxy_pass $target;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}
