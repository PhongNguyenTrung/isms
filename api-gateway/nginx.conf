events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth-service:3001;
    }

    upstream ordering_service {
        server ordering-service:3002;
    }

    upstream kitchen_service {
        server kitchen-service:3003;
    }

    upstream analytics_service {
        server analytics-service:3007;
    }

    upstream kitchen_service_api {
        server kitchen-service:3003;
    }

    upstream inventory_service {
        server inventory-service:3005;
    }

    upstream notification_service {
        server notification-service:3006;
    }

    server {
        listen 80;
        resolver 127.0.0.11 valid=10s;

        location /api/auth/ {
            proxy_pass http://auth_service/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/menu/ {
            proxy_pass http://ordering_service/api/menu/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/orders/ {
            proxy_pass http://ordering_service/api/orders/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/kitchen/ {
            proxy_pass http://kitchen_service_api/api/kitchen/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/inventory/ {
            proxy_pass http://inventory_service/api/inventory/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/notifications/ {
            proxy_pass http://notification_service/api/notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/analytics/ {
            proxy_pass http://analytics_service/api/analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket for Analytics Dashboard (Manager Dashboard)
        location /analytics.io/ {
            rewrite ^/analytics\.io(.*)$ /socket.io$1 break;
            proxy_pass http://analytics_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # WebSocket support for Kitchen Display System
        location /socket.io/ {
            proxy_pass http://kitchen_service/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}
