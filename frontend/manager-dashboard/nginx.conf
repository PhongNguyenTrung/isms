server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api-gateway:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://api-gateway:80/uploads/;
        proxy_set_header Host $host;
    }

    # WebSocket: Kitchen Display System (KDS) → kitchen-service:3003
    location /socket.io/ {
        proxy_pass http://kitchen-service:3003/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # WebSocket: Analytics Dashboard → analytics-service:3007
    location /analytics.io/ {
        rewrite ^/analytics\.io(.*)$ /socket.io$1 break;
        proxy_pass http://analytics-service:3007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
