version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL Database
  # Used by: auth-service, ordering-service, kitchen-service
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: irms-postgres
    environment:
      POSTGRES_USER: irms_user
      POSTGRES_PASSWORD: irms_password
      POSTGRES_DB: irms_db # We can segregate logical DBs later
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - irms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irms_user -d irms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Redis Cache
  # Used by: multiple services for caching and rate limiting
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: irms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - irms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Zookeeper (Required for Kafka)
  # ----------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: irms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - irms-network

  # ----------------------------------------------------------------------------
  # Kafka Message Broker
  # ----------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: irms-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - irms-network
    healthcheck:
      test: nc -z localhost 9092 || exit -1
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Microservices
  # ----------------------------------------------------------------------------
  auth-service:
    build: ./services/auth-service
    container_name: irms-auth
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      JWT_SECRET: super_secret_jwt_key_for_irms_development
      DB_USER: irms_user
      DB_PASSWORD: irms_password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: irms_db
    networks:
      - irms-network

  ordering-service:
    build: ./services/ordering-service
    container_name: irms-ordering
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      PORT: 3002
      JWT_SECRET: super_secret_jwt_key_for_irms_development
      DB_USER: irms_user
      DB_PASSWORD: irms_password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: irms_db
      KAFKA_BROKERS: kafka:29092
    networks:
      - irms-network

  kitchen-service:
    build: ./services/kitchen-service
    container_name: irms-kitchen
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      PORT: 3003
      JWT_SECRET: super_secret_jwt_key_for_irms_development
      DB_USER: irms_user
      DB_PASSWORD: irms_password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: irms_db
      KAFKA_BROKERS: kafka:29092
    networks:
      - irms-network

  # ----------------------------------------------------------------------------
  # IoT Gateway & Inventory Services (Phase 2)
  # ----------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: irms-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - irms-network

  influxdb:
    image: influxdb:2.7-alpine
    container_name: irms-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: irms_user
      DOCKER_INFLUXDB_INIT_PASSWORD: irms_password
      DOCKER_INFLUXDB_INIT_ORG: irms_org
      DOCKER_INFLUXDB_INIT_BUCKET: irms_bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: super_secret_influx_token_for_irms_development
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - irms-network

  iot-gateway:
    build: ./services/iot-gateway
    container_name: irms-iot-gateway
    depends_on:
      - mosquitto
      - kafka
    environment:
      PORT: 3004
      MQTT_BROKER: mqtt://mosquitto:1883
      KAFKA_BROKERS: kafka:29092
    networks:
      - irms-network

  inventory-service:
    build: ./services/inventory-service
    container_name: irms-inventory
    depends_on:
      - influxdb
      - kafka
    environment:
      PORT: 3005
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: super_secret_influx_token_for_irms_development
      INFLUXDB_ORG: irms_org
      INFLUXDB_BUCKET: irms_bucket
      KAFKA_BROKERS: kafka:29092
    networks:
      - irms-network

  # ----------------------------------------------------------------------------
  # Analytics & Notifications Services (Phase 3)
  # ----------------------------------------------------------------------------
  notification-service:
    build: ./services/notification-service
    container_name: irms-notification
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      PORT: 3006
      DB_USER: irms_user
      DB_PASSWORD: irms_password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: irms_db
      KAFKA_BROKERS: kafka:29092
    networks:
      - irms-network

  analytics-service:
    build: ./services/analytics-service
    container_name: irms-analytics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      PORT: 3007
      DB_USER: irms_user
      DB_PASSWORD: irms_password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: irms_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:29092
    networks:
      - irms-network

  # ----------------------------------------------------------------------------
  # API Gateway
  # ----------------------------------------------------------------------------
  api-gateway:
    image: nginx:alpine
    container_name: irms-gateway
    ports:
      - "8080:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - ordering-service
      - kitchen-service
    networks:
      - irms-network

networks:
  irms-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
